{% extends "base.html" %}
{% block title %}{{ '공제 항목 수정' if mode == 'edit' else '공제 항목 추가' }} | 인건비 관리 시스템{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ '✏️ 공제 항목 수정' if mode == 'edit' else '➕ 공제 항목 추가' }}</h1>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <form method="POST">
      <div class="card">
        <div class="card-body">
          <div class="row g-3">

            <div class="col-12">
              <label class="form-label fw-bold">공제 항목명 <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control"
                     value="{{ item.name if item else '' }}"
                     placeholder="예: 주택자금대출상환" required>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">지급 조건</label>
              <select name="payment_condition" class="form-select" id="condSelect"
                      onchange="toggleCondVal()">
                {% for val, label in [('fixed','고정'), ('min_days','최소 근무일수')] %}
                <option value="{{ val }}"
                  {{ 'selected' if item and item.payment_condition == val }}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="col-md-6" id="condValBox"
                 style="{{ '' if (item and item.payment_condition == 'min_days') else 'display:none' }}">
              <label class="form-label fw-bold">조건 값 (일)</label>
              <input type="number" name="condition_value" class="form-control" min="0"
                     value="{{ item.condition_value if item else 0 }}">
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">적용 대상</label>
              <select name="apply_target" class="form-select">
                {% for val, label in [('all','전체'), ('정규직','정규직'), ('계약직','계약직')] %}
                <option value="{{ val }}"
                  {{ 'selected' if item and item.apply_target == val }}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="col-md-6 d-flex flex-column gap-2 pt-2">
              <div class="form-check mt-3">
                <input type="checkbox" name="is_insurance" class="form-check-input"
                       id="isInsurance"
                       {{ 'checked' if item and item.is_insurance }}>
                <label class="form-check-label" for="isInsurance">
                  4대보험 항목
                  <span class="text-muted" style="font-size:11px">(고지서 연동 예정)</span>
                </label>
              </div>
              <div class="form-check">
                <input type="checkbox" name="is_active" class="form-check-input"
                       id="isActive"
                       {{ 'checked' if not item or item.is_active }}>
                <label class="form-check-label" for="isActive">활성</label>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">
          {{ '수정 완료' if mode == 'edit' else '추가' }}
        </button>
        <a href="{{ url_for('deduction_list') }}" class="btn btn-outline-secondary">취소</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleCondVal() {
  const show = document.getElementById('condSelect').value === 'min_days';
  document.getElementById('condValBox').style.display = show ? '' : 'none';
}
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}인건비 관리 시스템{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<!-- ── 상단 네비게이션 ──────────────────────── -->
<nav class="topbar">
  <a href="{{ url_for('index') }}" class="topbar-brand">📊 인건비 관리 시스템</a>

  <ul class="topbar-nav list-unstyled mb-0">
    <li class="nav-item">
      <a href="{{ url_for('employee_list') }}"
         class="{% if request.endpoint in ['employee_list','employee_new','employee_edit','employee_register','employee_bulk_upload','allowance_list','allowance_new','allowance_edit','deduction_list','deduction_new','deduction_edit'] %}active{% endif %}">
        기초자료 등록
      </a>
    </li>
    <li class="nav-item">
      <a href="{{ url_for('payroll') }}"
         class="{% if request.endpoint == 'payroll' %}active{% endif %}">
        급여작업
      </a>
    </li>
    <li class="nav-item">
      <a href="{{ url_for('labor_cost') }}"
         class="{% if request.endpoint == 'labor_cost' %}active{% endif %}">
        인건비
      </a>
    </li>
    <li class="nav-item">
      <a href="{{ url_for('analysis') }}"
         class="{% if request.endpoint == 'analysis' %}active{% endif %}">
        기타분석
      </a>
    </li>
  </ul>

  <div class="topbar-right">
    <a href="{{ url_for('settings') }}" class="btn-settings"
       title="설정"
       style="{% if request.endpoint == 'settings' %}background:rgba(255,255,255,0.3){% endif %}">
      ⚙️
    </a>
  </div>
</nav>

<!-- ── 플래시 메시지 ─────────────────────────── -->
<div class="flash-container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'danger' if category == 'danger' else category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
</div>

<!-- ── 본문 ─────────────────────────────────── -->
<div class="page-wrapper">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // 플래시 메시지 3초 후 자동 닫기
  setTimeout(() => {
    document.querySelectorAll('.flash-container .alert').forEach(el => {
      new bootstrap.Alert(el).close();
    });
  }, 3000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
